<div class="digital-field-report">
    <h2>Digital Field Report</h2>
    <form id="fieldReportForm">
        <label for="reporterName">Name:</label>
        <input type="text" id="reporterName" name="reporterName" required>
        
        <label for="reportDate">Date:</label>
        <input type="date" id="reportDate" name="reportDate" required>
        
        <label for="reportDescription">Description:</label>
        <textarea id="reportDescription" name="reportDescription" required></textarea>
        
        <input type="submit" value="Submit Report">
    </form>
</div>
<style>
    .digital-field-report {
        border: 1px solid #ccc;
        padding: 15px;
        margin: 20px 0;
        background-color: #f9f9f9;
    }
    .digital-field-report h2 {
        color: #333;
    }
    .digital-field-report label {
        display: block;
        margin-bottom: 8px;
    }
    .digital-field-report input,
    .digital-field-report textarea {
        width: 100%;
        margin-bottom: 12px;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
</style>
